<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI培训问答助手 - 智能培训解决方案</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f1f5f9;
            --bg-elevated: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-tertiary: #ec4899;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --user-bubble: var(--accent-gradient);
            --ai-bubble: #f1f5f9;
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --bg-elevated: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #334155;
            --ai-bubble: #334155;
            --user-bubble: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
        }

        /* App Layout */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 0 20px 5px rgba(99, 102, 241, 0.2); }
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.125rem;
        }

        .logo-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .header-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            transform: translateY(-2px);
        }

        /* Stats Banner */
        .stats-banner {
            background: var(--accent-gradient);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: white;
            font-size: 0.8125rem;
            opacity: 0.95;
        }

        .stat-item i {
            width: 16px;
            height: 16px;
        }

        /* Quick Actions */
        .quick-actions {
            background: var(--bg-tertiary);
            padding: 1rem 1.5rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            flex-shrink: 0;
            border-bottom: 1px solid var(--border-color);
        }

        .quick-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 0.875rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .quick-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.05);
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Welcome Message */
        .welcome {
            text-align: center;
            padding: 3rem 1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .welcome-icon {
            width: 80px;
            height: 80px;
            background: var(--accent-gradient);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: white;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .welcome h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .welcome p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .suggestions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .suggestion-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .suggestion-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .suggestion-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg), 0 0 20px rgba(99, 102, 241, 0.15);
        }

        .suggestion-card:hover::before {
            opacity: 1;
        }

        .suggestion-card h4 {
            font-size: 0.875rem;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .suggestion-card p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Message Bubbles */
        .message {
            display: flex;
            gap: 1rem;
            max-width: 800px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .message.assistant .message-avatar {
            background: var(--accent-gradient);
            color: white;
        }

        .message.user .message-avatar {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .message-content {
            flex: 1;
        }

        .message-bubble {
            padding: 1rem 1.25rem;
            border-radius: 16px;
            position: relative;
        }

        .message.assistant .message-bubble {
            background: var(--ai-bubble);
            border-bottom-left-radius: 4px;
        }

        .message.user .message-bubble {
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-text {
            font-size: 0.9375rem;
            line-height: 1.7;
        }

        .message-text p {
            margin-bottom: 0.75rem;
        }

        .message-text p:last-child {
            margin-bottom: 0;
        }

        .message-text ul, .message-text ol {
            margin: 0.75rem 0;
            padding-left: 1.5rem;
        }

        .message-text li {
            margin-bottom: 0.5rem;
        }

        .message-text strong {
            font-weight: 600;
        }

        .message-text h4 {
            font-size: 1rem;
            font-weight: 600;
            margin: 1rem 0 0.5rem;
            color: var(--accent-primary);
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
        }

        .message.user .message-time {
            text-align: right;
        }

        /* Tables in Messages */
        .message-text table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.875rem;
            overflow-x: auto;
            display: block;
        }

        .message-text th, .message-text td {
            padding: 0.625rem 0.75rem;
            border: 1px solid var(--border-color);
            text-align: left;
        }

        .message-text th {
            background: var(--bg-tertiary);
            font-weight: 600;
        }

        .message-text tr:nth-child(even) {
            background: rgba(0,0,0,0.02);
        }

        [data-theme="dark"] .message-text tr:nth-child(even) {
            background: rgba(255,255,255,0.03);
        }

        /* Blockquotes */
        .message-text blockquote {
            border-left: 3px solid var(--accent-primary);
            padding: 0.5rem 1rem;
            margin: 1rem 0;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 0 8px 8px 0;
        }

        /* Code blocks */
        .message-text code {
            background: var(--bg-tertiary);
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
            font-size: 0.875em;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }

        .message-text pre {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 1rem;
            margin: 0.75rem 0;
            overflow-x: auto;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.8125rem;
            border: 1px solid var(--border-color);
        }

        /* Template Card */
        .template-card {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 1rem;
            margin: 0.75rem 0;
        }

        .template-card h5 {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--accent-primary);
        }

        .template-card pre {
            background: var(--bg-tertiary);
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 0.8125rem;
            overflow-x: auto;
        }

        /* Copy Button */
        .copy-btn {
            padding: 0.375rem 0.75rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            margin-top: 0.5rem;
        }

        .copy-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 1rem;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        /* Input Area */
        .input-area {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 1rem 1.5rem;
            flex-shrink: 0;
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .input-wrapper {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
            background: var(--bg-tertiary);
            border-radius: 16px;
            padding: 0.75rem;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-primary);
            background: var(--bg-secondary);
        }

        .input-field {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 0.9375rem;
            resize: none;
            outline: none;
            max-height: 150px;
            min-height: 24px;
            font-family: inherit;
            line-height: 1.5;
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 100px;
            right: 1.5rem;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .toast {
            padding: 1rem 1.25rem;
            background: var(--bg-elevated);
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideIn 0.3s ease;
            border: 1px solid var(--border-color);
        }

        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--error); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* GitHub Corner */
        .github-corner {
            position: fixed;
            top: 0;
            right: 0;
            z-index: 100;
        }

        .github-corner svg {
            width: 80px;
            height: 80px;
            fill: var(--accent-primary);
            transition: transform 0.3s ease;
        }

        .github-corner:hover svg {
            transform: scale(1.1);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .header {
                padding: 1rem;
            }

            .logo-text {
                font-size: 1rem;
            }

            .logo-subtitle {
                display: none;
            }

            .stats-banner {
                gap: 1rem;
                padding: 0.5rem 1rem;
            }

            .stat-item {
                font-size: 0.75rem;
            }

            .quick-actions {
                padding: 0.75rem 1rem;
                overflow-x: auto;
                flex-wrap: nowrap;
            }

            .quick-btn {
                white-space: nowrap;
                flex-shrink: 0;
            }

            .chat-container {
                padding: 1rem;
            }

            .message {
                max-width: 100%;
            }

            .suggestions {
                grid-template-columns: 1fr;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- GitHub Corner -->
        <a href="https://github.com/ASJ-Alita/training-assistant-1.0" target="_blank" class="github-corner">
            <svg viewBox="0 0 250 250">
                <path d="M0,0 L115,115 C15,85 5,55 0,0 Z"/>
                <path fill="white" d="M128,3 C94,3 65,32 65,66 L65,85 L50,85 C46,85 42,89 42,93 L42,120 L36,120 C32,120 28,124 28,128 L28,155 C28,159 32,163 36,163 L60,163 C64,163 68,159 68,155 L68,128 L90,128 C95,163 120,183 145,183 C170,183 195,163 200,128 L200,155 C200,159 204,163 208,163 L232,163 C236,163 240,159 240,155 L240,128 C240,124 236,120 232,120 L226,120 L226,93 C226,89 222,85 218,85 L203,85 L203,66 C203,32 174,3 140,3 L128,3 Z"/>
            </svg>
        </a>

        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <div class="logo-icon">
                        <i data-lucide="graduation-cap" width="22" height="22"></i>
                    </div>
                    <div>
                        <div class="logo-text">AI培训问答助手</div>
                        <div class="logo-subtitle">本地知识库版本 · 无需API</div>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <button class="header-btn" id="clearBtn" title="清空对话">
                    <i data-lucide="trash-2" width="18" height="18"></i>
                </button>
                <button class="header-btn" id="themeBtn" title="切换主题">
                    <i data-lucide="moon" width="18" height="18"></i>
                </button>
            </div>
        </header>

        <!-- Stats Banner -->
        <div class="stats-banner">
            <div class="stat-item">
                <i data-lucide="book-open"></i>
                <span>12+培训场景</span>
            </div>
            <div class="stat-item">
                <i data-lucide="layout-template"></i>
                <span>5+模板库</span>
            </div>
            <div class="stat-item">
                <i data-lucide="cpu"></i>
                <span>本地智能推理</span>
            </div>
            <div class="stat-item">
                <i data-lucide="shield-check"></i>
                <span>数据本地存储</span>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <button class="quick-btn" data-question="新员工入职培训方案">
                <i data-lucide="user-plus" width="16" height="16"></i>
                新员工培训
            </button>
            <button class="quick-btn" data-question="如何设计领导力培训课程">
                <i data-lucide="crown" width="16" height="16"></i>
                领导力培训
            </button>
            <button class="quick-btn" data-question="培训效果评估方法">
                <i data-lucide="bar-chart-2" width="16" height="16"></i>
                效果评估
            </button>
            <button class="quick-btn" data-question="培训需求分析方法">
                <i data-lucide="search" width="16" height="16"></i>
                需求分析
            </button>
            <button class="quick-btn" data-question="推荐一些培训方法">
                <i data-lucide="target" width="16" height="16"></i>
                培训方法
            </button>
        </div>

        <!-- Chat Container -->
        <div class="chat-container" id="chatContainer">
            <!-- Welcome Message -->
            <div class="welcome" id="welcome">
                <div class="welcome-icon">
                    <i data-lucide="bot" width="40" height="40"></i>
                </div>
                <h2>您好！我是您的AI培训助手</h2>
                <p>我是基于本地知识库的智能培训问答助手，无需联网即可使用。内置12+培训场景专业知识库，包括课程设计、培训方法、效果评估等</p>
                <div class="suggestions">
                    <div class="suggestion-card" data-question="如何设计一门新员工入职培训课程？">
                        <h4>📚 新员工培训设计</h4>
                        <p>了解入职培训的完整设计流程</p>
                    </div>
                    <div class="suggestion-card" data-question="培训效果不好，有什么改进方法？">
                        <h4>📈 培训效果提升</h4>
                        <p>诊断问题并提供解决方案</p>
                    </div>
                    <div class="suggestion-card" data-question="如何做培训需求调研？">
                        <h4>🔍 培训需求调研</h4>
                        <p>掌握需求分析的实用方法</p>
                    </div>
                    <div class="suggestion-card" data-question="推荐一些培训方法">
                        <h4>🎯 培训方法推荐</h4>
                        <p>根据场景推荐最适合的方法</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea
                        class="input-field"
                        id="inputField"
                        placeholder="输入您的培训问题..."
                        rows="1"
                    ></textarea>
                    <button class="send-btn" id="sendBtn" disabled>
                        <i data-lucide="send" width="20" height="20"></i>
                    </button>
                </div>
            </div>
        </div>

        // ==================== Initialize ====================
        function init() {
            // Set theme
            document.documentElement.setAttribute('data-theme', state.theme);
            updateThemeIcon();

            // Load saved messages
            renderMessages();
        }

        // ==================== Message Handling ====================
        function addMessage(role, content) {
            state.messages.push({ role, content, time: new Date().toISOString() });
            saveMessages();
            renderMessages();
            scrollToBottom();
        }

        function renderMessages() {
            if (state.messages.length === 0) {
                elements.welcome.style.display = 'block';
                return;
            }

            elements.welcome.style.display = 'none';

            const messagesHtml = state.messages.map(msg => {
                const time = new Date(msg.time).toLocaleTimeString('zh-CN', {
                    hour: '2-digit',
                    minute: '2-digit'
                });

                const avatarIcon = msg.role === 'assistant' ? 'bot' : 'user';
                const avatarClass = msg.role === 'assistant' ? 'assistant' : 'user';

                return `
                    <div class="message ${avatarClass}">
                        <div class="message-avatar">
                            <i data-lucide="${avatarIcon}" width="18" height="18"></i>
                        </div>
                        <div class="message-content">
                            <div class="message-bubble">
                                <div class="message-text">${formatContent(msg.content)}</div>
                            </div>
                            <div class="message-time">${time}</div>
                        </div>
                    </div>
                `;
            }).join('');

            elements.chatContainer.innerHTML = messagesHtml;
            lucide.createIcons();
        }

        function formatContent(content) {
            // Convert markdown tables to HTML
            let formatted = convertTables(content);
            
            // Convert markdown-like formatting
            formatted = formatted
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');

            // Wrap in paragraph
            formatted = '<p>' + formatted + '</p>';

            return formatted;
        }

        // Convert markdown tables to HTML
        function convertTables(text) {
            const tableRegex = /\|(.+)\|[\r\n]+\|[-:\s|]+\|[\r\n]+((?:\|.+\|[\r\n]?)+)/g;
            
            return text.replace(tableRegex, (match, header, body) => {
                // Parse header row
                const headers = header.split('|').map(h => h.trim()).filter(h => h);
                
                // Parse body rows
                const rows = body.trim().split('\n').map(row => 
                    row.split('|').map(cell => cell.trim()).filter(cell => cell)
                );
                
                // Build HTML table
                let html = '<table>';
                
                // Header
                html += '<thead><tr>';
                headers.forEach(h => {
                    html += `<th>${h}</th>`;
                });
                html += '</tr></thead>';
                
                // Body
                html += '<tbody>';
                rows.forEach(row => {
                    html += '<tr>';
                    row.forEach(cell => {
                        html += `<td>${cell}</td>`;
                    });
                    html += '</tr>';
                });
                html += '</tbody></table>';
                
                return html;
            });
        }

        function saveMessages() {
            localStorage.setItem('training_assistant_messages', JSON.stringify(state.messages));
        }

        function scrollToBottom() {
            elements.chatContainer.scrollTop = elements.chatContainer.scrollHeight;
        }

        // ==================== AI Response (Local Knowledge Base) ====================
        async function generateResponse(userQuestion) {
            state.isTyping = true;
            elements.sendBtn.disabled = true;

            // Add user message
            addMessage('user', userQuestion);

            // Show typing indicator
            const typingHtml = `
                <div class="message assistant" id="typingMessage">
                    <div class="message-avatar">
                        <i data-lucide="bot" width="18" height="18"></i>
                    </div>
                    <div class="message-content">
                        <div class="message-bubble">
                            <div class="typing-indicator">
                                <span></span>
                                <span></span>
                                <span></span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            elements.chatContainer.insertAdjacentHTML('beforeend', typingHtml);
            lucide.createIcons();
            scrollToBottom();

            // Simulate thinking delay
            await new Promise(resolve => setTimeout(resolve, 800 + Math.random() * 700));

            // Find matching knowledge
            const response = findBestMatch(userQuestion);

            // Remove typing indicator
            document.getElementById('typingMessage')?.remove();

            // Add AI response
            addMessage('assistant', response);

            state.isTyping = false;
            elements.sendBtn.disabled = false;
        }

        // Find best matching knowledge
        function findBestMatch(question) {
            const q = question.toLowerCase();

            // Check each knowledge item
            for (const [key, item] of Object.entries(knowledgeBase)) {
                for (const keyword of item.keywords) {
                    if (q.includes(keyword.toLowerCase())) {
                        return item.response(question);
                    }
                }
            }

            // Default response
            return defaultResponse(question);
        }

        // ==================== UI Functions ====================
        function toggleTheme() {
            state.theme = state.theme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', state.theme);
            localStorage.setItem('training_assistant_theme', state.theme);
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = elements.themeBtn.querySelector('i');
            icon.setAttribute('data-lucide', state.theme === 'light' ? 'moon' : 'sun');
            lucide.createIcons();
        }

        function clearChat() {
            if (confirm('确定要清空所有对话记录吗？')) {
                state.messages = [];
                saveMessages();
                renderMessages();
                showToast('对话已清空', 'success');
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i data-lucide="${type === 'success' ? 'check-circle' : 'alert-circle'}" width="18" height="18"></i>
                <span>${message}</span>
            `;
            elements.toastContainer.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // ==================== Event Listeners ====================
        elements.sendBtn.addEventListener('click', () => {
            const question = elements.inputField.value.trim();
            if (question && !state.isTyping) {
                generateResponse(question);
                elements.inputField.value = '';
                elements.inputField.style.height = 'auto';
            }
        });

        elements.inputField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                elements.sendBtn.click();
            }
        });

        elements.inputField.addEventListener('input', () => {
            elements.inputField.style.height = 'auto';
            elements.inputField.style.height = Math.min(elements.inputField.scrollHeight, 150) + 'px';
            elements.sendBtn.disabled = !elements.inputField.value.trim();
        });

        elements.themeBtn.addEventListener('click', toggleTheme);
        elements.clearBtn.addEventListener('click', clearChat);

        // Quick action buttons
        document.querySelectorAll('.quick-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const question = btn.dataset.question;
                elements.inputField.value = question;
                elements.sendBtn.disabled = false;
                generateResponse(question);
            });
        });

        // Suggestion cards
        document.querySelectorAll('.suggestion-card').forEach(card => {
            card.addEventListener('click', () => {
                const question = card.dataset.question;
                elements.inputField.value = question;
                elements.sendBtn.disabled = false;
                generateResponse(question);
            });
        });

        // Initialize
        init();
    </script>

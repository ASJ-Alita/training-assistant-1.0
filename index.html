    <script>
        // 等待 DOM 完全加载
        window.addEventListener('DOMContentLoaded', initApp);
        
        function initApp() {
            const chatArea = document.getElementById('chatArea');
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            
            // 对话上下文 - 记录当前对话主题
            let conversationContext = {
            currentModule: null,  // 当前模块
            moduleName: '',       // 模块名称
            history: []           // 历史记录 [{q, a, module}]
        };
        
        // 追问模式识别
        const followUpPatterns = [
            { pattern: /^(具体|详细|详细说|具体说)/, type: 'detail' },
            { pattern: /^(继续|还有|还有呢|然后呢|接下来)/, type: 'continue' },
            { pattern: /^(第[一二三四五六七八九十\d]+天|第[一二三四五六七八九十\d]+步)/, type: 'detail' },
            { pattern: /^(第一天|第二天|第三天|第四天|第五天)/, type: 'detail' },
            { pattern: /^(怎么|如何|怎样)/, type: 'how' },
            { pattern: /^(能不能|可以|能说)/, type: 'request' },
            { pattern: /^(给我|帮[我做]/, type: 'request' },
        ];
        
        // 判断是否为空问题
        function isEmptyQuestion(text) {
            return /^(具体|继续|还有|然后|接下来|详细|怎么|如何|怎样)/.test(text.trim());
        }
        
        // Enable/disable send button
        userInput.addEventListener('input', () => {
            sendBtn.disabled = !userInput.value.trim();
        });
        
        // Send message on button click
        sendBtn.addEventListener('click', sendMessage);
        
        // Send message on Enter key
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            
            // 检查是否是追问
            const isFollowUp = isEmptyQuestion(text) && conversationContext.currentModule !== null;
            
            // Add user message
            addMessage(text, 'user');
            userInput.value = '';
            sendBtn.disabled = true;
            
            // Show typing indicator
            const typing = showTyping();
            
            // Simulate AI response
            setTimeout(() => {
                typing.remove();
                const response = getAIResponse(text, isFollowUp);
                addMessage(response, 'ai', conversationContext.currentModule);
                
                // 记录历史
                conversationContext.history.push({
                    question: text,
                    response: response,
                    module: conversationContext.currentModule
                });
            }, 800);
        }
        
        function addMessage(text, type, module = null) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            
            if (type === 'ai' && module) {
                div.innerHTML = `<div class="module-tag">📌 ${module}</div>\n${escapeHtml(text)}`;
            } else {
                div.textContent = text;
            }
            
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message ai';
            div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
            return div;
        }
        
        function getAIResponse(question, isFollowUp) {
            const q = question.toLowerCase().trim();
            
            // 如果是追问，优先使用上下文
            if (isFollowUp) {
                const followUpResponse = getFollowUpResponse(q, conversationContext.currentModule);
                if (followUpResponse) {
                    return followUpResponse;
                }
            }
            
            // 否则按关键词匹配
            const matchedModule = matchKnowledgeBase(q);
            if (matchedModule) {
                conversationContext.currentModule = matchedModule.module;
                conversationContext.moduleName = matchedModule.name;
                return matchedModule.response;
            }
            
            // 没有匹配，重置上下文
            conversationContext.currentModule = null;
            return getDefaultResponse();
        }
